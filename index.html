<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Physical Robotics</title>
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: row; 
            justify-content: center; 
            align-items: flex-start; 
            margin: 0; 
            padding: 20px; 
            gap: 20px; 
            height: 100vh;
            box-sizing: border-box;
        }
        
        h1 { margin: 0 0 15px 0; letter-spacing: 1px; text-align: center; width: 100%; font-size: 1.5rem; text-transform: uppercase; color: #fff; }
        
        /* Layout Columns */
        .main-column { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 600px; 
        }
        
        .side-column { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 350px; 
            height: 100%;
            justify-content: flex-start;
            padding-top: 55px; 
        }

        /* Game Elements */
        .game-container { 
            position: relative; 
            border: 3px solid #444; 
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); 
            transition: border-color 0.3s; 
            margin-bottom: 15px;
        }
        .connected { border-color: #00ffcc; } .disconnected { border-color: #ff0055; }
        canvas { background-color: #1e1e1e; display: block; }
        
        .hud { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            box-sizing: border-box;
            margin: 0 0 15px 0; 
            padding: 15px 20px; 
            background: #252526; 
            border-radius: 8px; 
            font-weight: bold; 
            border: 1px solid #333; 
            font-size: 1.1rem; 
        }
        .team-a { color: #448aff; } .team-b { color: #ff5252; }
        .gold-stat { color: #FFD700; text-shadow: 0 0 5px rgba(255, 215, 0, 0.3); }

        /* Bottom Area (Legend + Controls) */
        .bottom-panel {
            display: flex;
            flex-direction: row;
            width: 100%;
            gap: 15px;
        }

        .panel-box {
            background: #2d2d30; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #444;
            flex: 1;
        }

        .legend-title { font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px; font-size: 0.9rem; color: #aaa; text-transform: uppercase; }
        .legend-item { display: flex; align-items: center; margin: 5px 0; font-size: 0.85rem; }
        .badge { display: inline-block; width: 18px; height: 18px; text-align: center; line-height: 18px; font-weight: bold; border-radius: 3px; margin-right: 8px; color: #000; font-size: 0.75rem;}

        .controls { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        
        button { padding: 8px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.85rem; transition: transform 0.1s, filter 0.2s; text-transform: uppercase; }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.95); }
        .btn-start { background-color: #28a745; color: white; grid-column: span 2; } 
        .btn-stop { background-color: #dc3545; color: white; }
        .btn-step { background-color: #007bff; color: white; } 
        .btn-reset { background-color: #6c757d; color: white; grid-column: span 2; }

        .slider-wrapper { width: 100%; text-align: center; margin-top: 5px; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; background: #444; border-radius: 5px; outline: none; opacity: 0.9; transition: .2s; }
        input[type=range]:hover { opacity: 1; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #00ffcc; cursor: pointer; box-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }
        .speed-label { font-size: 0.8rem; color: #bbb; margin-top: 5px; display: block;}
        .speed-val { color: #fff; font-weight: bold; }

        /* Terminal Log */
        .terminal {
            width: 100%; height: 600px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px;
            overflow-y: auto; padding: 15px; font-family: 'Consolas', monospace; font-size: 0.85rem;
            display: flex; flex-direction: column; box-sizing: border-box; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .terminal-header { font-weight: bold; color: #888; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .terminal::-webkit-scrollbar { width: 8px; }
        .terminal::-webkit-scrollbar-track { background: #111; }
        .terminal::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .log-msg { margin: 2px 0; border-bottom: 1px solid #1a1a1a; padding: 3px 0; word-wrap: break-word; line-height: 1.4; }
        .log-A { color: #82b1ff; } 
        .log-B { color: #ff867f; }
        .log-Sys { color: #666; font-style: italic; }
        .log-Success { color: #00ffcc; font-weight: bold; border-left: 3px solid #00ffcc; padding-left: 5px; }

    </style>
</head>
<body>

    <div class="main-column">
        <h1>Cyber Physical Robotics</h1>
        
        <div class="hud">
            <div class="score-box team-a">Blue: <span id="scoreA">0</span></div>
            <div class="score-box gold-stat">Gold Left: <span id="goldLeft">0</span></div>
            <div class="score-box" style="color:#fff">Step: <span id="stepDisplay">0</span></div>
            <div class="score-box team-b">Red: <span id="scoreB">0</span></div>
        </div>

        <div class="game-container" id="gameContainer">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </div>

        <div class="bottom-panel">
            <div class="panel-box">
                <div class="legend-title">Robot Roles</div>
                <div class="legend-item"><span class="badge" style="background:#ccc;">S</span> Scout (Idle)</div>
                <div class="legend-item"><span class="badge" style="background:#ffd700;">M</span> Moving to Gold</div>
                <div class="legend-item"><span class="badge" style="background:#ff9800;">W</span> Waiting at Gold</div>
                <div class="legend-item"><span class="badge" style="background:#00ffcc;">C</span> Carrying Gold</div>
                <div style="margin-top:15px; font-size:0.75rem; color:#666; border-top:1px solid #444; padding-top:5px;">
                    Rule: Exact 2 robots ('W') needed to start Carrying ('C').
                </div>
            </div>

            <div class="panel-box controls">
                <div class="btn-grid">
                    <button class="btn-start" onclick="startSim()">START SIMULATION</button>
                    <button class="btn-step" onclick="stepSim()">STEP +1</button>
                    <button class="btn-stop" onclick="stopSim()">PAUSE</button>
                    <button class="btn-reset" onclick="resetSim()">RESET WORLD</button>
                </div>
                <div class="slider-wrapper">
                    <input type="range" id="speedSlider" min="1" max="50" value="10" oninput="updateSpeed()">
                    <span class="speed-label">Speed: <span id="speedVal" class="speed-val">10</span> TPS</span>
                </div>
            </div>
        </div>
    </div>

    <div class="side-column">
        <div class="terminal" id="terminalBox">
            <div class="terminal-header">> System Log</div>
            <div class="log-msg log-Sys">System Initialized...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 20, CELL = canvas.width / GRID_SIZE;
        let interval = null, isRunning = false;
        const API_URL = "http://127.0.0.1:5001";

        function drawBackground() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.lineWidth = 1;
            for(let i=0; i<=GRID_SIZE; i++) {
                ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
            }
            
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            ctx.fillStyle = '#9C27B0'; ctx.fillRect(0, 0, CELL, CELL);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; 
            ctx.fillText("BT", CELL/2, CELL/2);
            
            ctx.fillStyle = '#FF9800'; ctx.fillRect((GRID_SIZE-1)*CELL, (GRID_SIZE-1)*CELL, CELL, CELL);
            ctx.fillStyle = '#000'; 
            ctx.fillText("RT", (GRID_SIZE-1)*CELL + CELL/2, (GRID_SIZE-1)*CELL + CELL/2);
        }

        function drawIngot(x, y) {
            let cx = x * CELL;
            let cy = y * CELL;
            let w = CELL * 0.7;
            let h = CELL * 0.4;
            let offsetX = (CELL - w) / 2;
            let offsetY = (CELL - h) / 2;

            ctx.fillStyle = '#FFD700'; 
            ctx.strokeStyle = '#B8860B'; 
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.moveTo(cx + offsetX + 4, cy + offsetY); 
            ctx.lineTo(cx + offsetX + w - 4, cy + offsetY); 
            ctx.lineTo(cx + offsetX + w, cy + offsetY + h); 
            ctx.lineTo(cx + offsetX, cy + offsetY + h); 
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx + offsetX + 6, cy + offsetY + 4);
            ctx.lineTo(cx + offsetX + w - 8, cy + offsetY + 4);
            ctx.stroke();
        }

        function drawRobot(r) {
            let color = r.group === 'A' ? '#448aff' : '#ff5252';
            let rx = r.x*CELL+3, ry = r.y*CELL+3, rw = CELL-6;
            
            ctx.fillStyle = color; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
            ctx.fillRect(rx, ry, rw, rw); ctx.strokeRect(rx, ry, rw, rw);
            
            ctx.fillStyle = '#000'; 
            ctx.fillRect(rx+rw-12, ry, 12, 12);
            ctx.fillStyle = '#fff'; 
            ctx.font = 'bold 9px monospace'; 
            ctx.textAlign = "left"; 
            ctx.textBaseline = "top";
            ctx.fillText(r.role_char, rx+rw-9, ry+2);

            let label = r.id;
            if (r.group === 'A') {
                label = "B" + (r.id + 1);
            } else {
                label = "R" + (r.id - 9);
            }

            ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Arial'; 
            ctx.textAlign = "center"; 
            ctx.textBaseline = "middle";
            ctx.fillText(label, rx + rw/2, ry + rw/2);
        }

        function updateTerminal(logs) {
            const term = document.getElementById('terminalBox');
            term.innerHTML = '<div class="terminal-header">> System Log</div>'; 
            
            logs.forEach(log => {
                let div = document.createElement('div');
                div.className = `log-msg log-${log.type}`;
                div.innerText = `[Step ${log.tick}] ${log.text}`;
                term.appendChild(div);
            });
            
            term.scrollTop = term.scrollHeight;
        }

        async function api(endpoint, body=null) {
            try {
                let opts = { method: 'POST' };
                if(body) { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
                if(endpoint === '/state') opts.method = 'GET';
                let res = await fetch(`${API_URL}${endpoint}`, opts);
                if(!res.ok) throw new Error();
                let data = await res.json();
                render(data);
                document.getElementById('gameContainer').classList.add('connected');
                document.getElementById('gameContainer').classList.remove('disconnected');
            } catch(e) {
                console.error(e);
                document.getElementById('gameContainer').classList.add('disconnected');
                document.getElementById('gameContainer').classList.remove('connected');
                if(endpoint !== '/state') stopSim();
            }
        }

        function render(data) {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawBackground();
            data.gold.forEach(g => drawIngot(g.x, g.y));
            data.robots.forEach(r => drawRobot(r));
            
            document.getElementById('scoreA').innerText = data.score_a;
            document.getElementById('scoreB').innerText = data.score_b;
            document.getElementById('stepDisplay').innerText = data.tick;
            document.getElementById('goldLeft').innerText = data.gold_left; // Changed to use accurate count
            
            updateTerminal(data.logs);
        }

        function startSim() { if(!isRunning) { isRunning=true; updateSpeed(); } }
        function stopSim() { isRunning=false; clearInterval(interval); }
        function stepSim() { api('/step'); }
        function resetSim() { stopSim(); api('/reset'); }
        function updateSpeed() {
            let val = document.getElementById('speedSlider').value;
            document.getElementById('speedVal').innerText = val;
            if(isRunning) { clearInterval(interval); interval = setInterval(stepSim, 1000/val); }
        }
        drawBackground(); api('/state');
    </script>
</body>
</html>
